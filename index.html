<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CamDemo</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CamDemo" />
  <link rel="apple-touch-icon" href="icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png" />

  <style>
    :root {
      --bg:        #0f0f1a;
      --surface:   #1a1a2e;
      --surface2:  #16213e;
      --accent:    #4a90d9;
      --accent2:   #7eb8f7;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --success:   #34d399;
      --radius:    16px;
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      overflow-x: hidden;
    }

    header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.02em; }
    header p  { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    /* ─── Banner instalación ─── */
    #pwa-banner {
      margin: 16px 16px 0;
      padding: 14px 16px;
      background: rgba(74,144,217,0.10);
      border: 1px solid rgba(74,144,217,0.28);
      border-radius: var(--radius);
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--accent2);
    }
    #pwa-banner.hidden { display: none; }

    #pwa-banner .banner-title {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    #pwa-banner strong { color: var(--text); font-size: 0.88rem; }
    #dismiss-banner {
      background: none; border: none;
      color: var(--muted); font-size: 1.1rem; cursor: pointer;
    }

    .install-steps { display: flex; flex-direction: column; gap: 6px; }
    .step {
      display: flex; align-items: flex-start; gap: 10px;
    }
    .step-num {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(74,144,217,0.2);
      color: var(--accent2);
      font-size: 0.7rem; font-weight: 700;
      display: grid; place-items: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .step-text { color: var(--text); font-size: 0.78rem; line-height: 1.5; }
    .step-text .emoji { font-style: normal; }

    /* ─── Main ─── */
    main { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    /* ─── Preview ─── */
    #preview-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid rgba(255,255,255,0.07);
    }
    #preview-placeholder {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; color: var(--muted); font-size: 0.85rem; text-align: center;
      padding: 24px;
    }
    #preview-placeholder .ph-icon { font-size: 3rem; opacity: 0.35; }

    #preview-img { width:100%; height:100%; object-fit:cover; display:none; }
    #preview-img.visible { display:block; }

    #cam-video { width:100%; height:100%; object-fit:cover; display:none; }
    #cam-video.visible { display:block; }

    #cam-overlay {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 16px;
      background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.5));
    }
    #cam-overlay.visible { display: flex; }
    #capture-btn {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: white;
      border: 4px solid rgba(255,255,255,0.4);
      cursor: pointer;
      transition: transform 0.1s;
    }
    #capture-btn:active { transform: scale(0.91); }

    /* ─── Botones ─── */
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-card {
      background: var(--surface);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 20px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      cursor: pointer; transition: all 0.15s ease;
      -webkit-user-select: none; user-select: none;
    }
    .btn-card:active { transform: scale(0.95); background: var(--surface2); }
    .btn-card.blue  { border-color: rgba(74,144,217,0.35); background: rgba(74,144,217,0.08); }
    .btn-card.red   { border-color: rgba(239,68,68,0.35);  background: rgba(239,68,68,0.08); grid-column: span 2; }
    .btn-card .icon  { font-size: 2rem; }
    .btn-card .label { font-size: 0.82rem; font-weight: 600; text-align: center; }
    .btn-card.red .label { color: #f87171; }

    input[type=file] { display: none; }

    /* ─── Log ─── */
    #log-section h2 { font-size: 0.75rem; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
    #log {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 0.75rem;
      font-family: 'SF Mono', 'Menlo', monospace;
      color: var(--muted);
      max-height: 160px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 4px;
      border: 1.5px solid rgba(255,255,255,0.06);
    }
    .log-entry { display: flex; gap: 8px; }
    .log-time  { color: var(--accent); flex-shrink: 0; }
    .log-msg.ok   { color: var(--success); }
    .log-msg.err  { color: #f87171; }
    .log-msg.info { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="logo">📷</div>
  <div>
    <h1>CamDemo</h1>
    <p>Demo PWA · Tesis 2025</p>
  </div>
</header>

<div id="pwa-banner">
  <div class="banner-title">
    <strong>📲 Instalá la app en tu iPhone</strong>
    <button id="dismiss-banner">✕</button>
  </div>
  <div class="install-steps">
    <div class="step">
      <span class="step-num">1</span>
      <span class="step-text">Tocá <strong>···</strong></span>
    </div>
    <div class="step">
      <span class="step-num">2</span>
      <span class="step-text">Elegí <strong>Compartir</strong> <span class="emoji">⬆️</span> en el menú que aparece</span>
    </div>
    <div class="step">
      <span class="step-num">3</span>
      <span class="step-text">Tocá <strong>"Agregar a pantalla de inicio"</strong></span>
    </div>
  </div>
</div>

<main>
  <div id="preview-wrap">
    <div id="preview-placeholder">
      <div class="ph-icon">🖼️</div>
      <span>La foto aparecerá aquí</span>
    </div>
    <video id="cam-video" autoplay playsinline muted></video>
    <img id="preview-img" alt="Foto capturada" />
    <div id="cam-overlay">
      <button id="capture-btn" aria-label="Capturar foto"></button>
    </div>
  </div>

  <div class="btn-grid">
    <div class="btn-card blue" id="btn-input-cam">
      <span class="icon">📷</span>
      <span class="label">Tomar foto</span>
    </div>
    <div class="btn-card" id="btn-gallery">
      <span class="icon">🗂️</span>
      <span class="label">Importar foto</span>
    </div>
  </div>

  <div class="btn-grid" id="stop-section" style="display:none">
    <div class="btn-card red" id="btn-stop-cam">
      <span class="icon">⏹️</span>
      <span class="label">Detener cámara</span>
    </div>
  </div>

  <div id="log-section">
    <h2>Registro de eventos</h2>
    <div id="log"></div>
  </div>
</main>

<input type="file" id="input-cam"     accept="image/*" capture="environment" />
<input type="file" id="input-gallery" accept="image/*" />

<script>
  let stream = null;
  const video       = document.getElementById('cam-video');
  const overlay     = document.getElementById('cam-overlay');
  const previewImg  = document.getElementById('preview-img');
  const placeholder = document.getElementById('preview-placeholder');
  const stopSection = document.getElementById('stop-section');
  const banner      = document.getElementById('pwa-banner');

  // Ocultar banner si ya está instalada como PWA
  const isStandalone = window.navigator.standalone === true
    || window.matchMedia('(display-mode: standalone)').matches;
  if (isStandalone) banner.classList.add('hidden');

  document.getElementById('dismiss-banner').onclick = () => banner.classList.add('hidden');

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => log('ok', 'Service Worker registrado'))
      .catch(e => log('err', 'SW error: ' + e.message));
  }

  function log(type, msg) {
    const t = new Date().toTimeString().slice(0,8);
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">${t}</span><span class="log-msg ${type}">${msg}</span>`;
    document.getElementById('log').prepend(entry);
  }

  function showImage(blob) {
    const url = URL.createObjectURL(blob);
    previewImg.src = url;
    previewImg.classList.add('visible');
    placeholder.style.display = 'none';
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.classList.remove('visible');
    overlay.classList.remove('visible');
    stopSection.style.display = 'none';
    log('info', 'Cámara detenida');
  }

  async function openCamera(facing) {
    stopCamera();
    placeholder.style.display = 'flex';
    previewImg.classList.remove('visible');
    log('info', `Solicitando cámara ${facing === 'user' ? 'frontal' : 'trasera'}...`);
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: false });
      video.srcObject = stream;
      video.classList.add('visible');
      overlay.classList.add('visible');
      placeholder.style.display = 'none';
      stopSection.style.display = 'grid';
      log('ok', 'Cámara activa — presioná el botón blanco para capturar');
    } catch(e) {
      log('err', 'Error cámara: ' + e.message);
      alert('No se pudo acceder a la cámara.\n\n' + e.message);
    }
  }

  document.getElementById('capture-btn').onclick = () => {
    if (!stream) return;
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(blob => { stopCamera(); showImage(blob); }, 'image/jpeg', 0.92);
  };

  document.getElementById('btn-input-cam').onclick = () => { stopCamera(); document.getElementById('input-cam').click(); log('info', 'Abriendo cámara nativa...'); };
  document.getElementById('btn-gallery').onclick   = () => { stopCamera(); document.getElementById('input-gallery').click(); log('info', 'Abriendo galería...'); };

  function handleFile(input, source) {
    input.onchange = () => {
      const file = input.files[0];
      if (file) { showImage(file); log('ok', `Imagen recibida — ${(file.size/1024).toFixed(1)} KB`); input.value = ''; }
      else { log('info', 'Selección cancelada'); }
    };
  }
  handleFile(document.getElementById('input-cam'), 'Cámara nativa');
  handleFile(document.getElementById('input-gallery'), 'Galería');
</script>
</body>
</html>
